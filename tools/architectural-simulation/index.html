<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHI Safe-Fail Proxy Router Simulator</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --safe-color: #10b981;
            --danger-color: #ef4444;
            --accent-color: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 { margin-top: 0; font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        
        select, input[type="range"] {
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg-main);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .metric-val { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
        .metric-card.safe .metric-val { color: var(--safe-color); }
        .metric-card.danger .metric-val { color: var(--danger-color); }

        /* Architecture Diagram Canvas Style */
        .diagram-box {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #0b0f19;
            padding: 20px;
            position: relative;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            overflow: hidden;
        }

        .node {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 12px 20px;
            text-align: center;
            min-width: 180px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .node.active-proxy { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .node.destination { border-color: var(--border); }
        .node.ledger { border-color: var(--safe-color); background: rgba(16, 185, 129, 0.05); }

        .split-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 20px;
        }

        /* Flow Lines and Data Packets */
        .connector-line {
            position: absolute;
            background: var(--border);
            z-index: 1;
        }

        .packet {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-color);
            z-index: 3;
        }

        @keyframes flowDown {
            0% { top: 45px; opacity: 1; }
            100% { top: 115px; opacity: 0; }
        }

        @keyframes flowLeft {
            0% { top: 140px; left: 50%; width: 2px; height: 2px; background: var(--safe-color); }
            50% { top: 200px; left: 25%; }
            100% { top: 250px; left: 25%; opacity: 0; }
        }

        @keyframes flowRight {
            0% { top: 140px; left: 50%; width: 2px; height: 2px; }
            50% { top: 200px; left: 75%; }
            100% { top: 250px; left: 75%; opacity: 0; }
        }

        .pane-desc { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; margin-top: 4px; display: block;}
    </style>
</head>
<body>

<div class="container">
    <h2>Interactive Architecture Tool: NHI Remediator Proxy Logic</h2>
    
    <div class="controls">
        <div class="control-group">
            <label for="routingMode">Routing Enforcement Mode</label>
            <select id="routingMode" onchange="updateSimulation()">
                <option value="shadow">Shadow Logging (Safe-Fail Mode)</option>
                <option value="block">Hard Block (Legacy IAM Mode)</option>
            </select>
        </div>
        <div class="control-group">
            <label for="trafficSlider">Active Orphan Request Volume (req/sec)</label>
            <input type="range" id="trafficSlider" min="10" max="500" value="140" oninput="updateSimulation()">
            <span id="trafficVal" style="font-size: 0.85rem; color: var(--text-muted)">140 req/sec</span>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-card" id="coverageCard">
            <label>Security Insight Coverage</label>
            <div class="metric-val" id="metricCoverage">100%</div>
        </div>
        <div class="metric-card safe" id="downtimeCard">
            <label>Induced Pipeline Outages</label>
            <div class="metric-val" id="metricDowntime">0%</div>
        </div>
        <div class="metric-card" id="handlingCard">
            <label>Telemetry Collection State</label>
            <div class="metric-val" id="metricState" style="font-size: 1.3rem; padding-top: 8px;">Active Auditing</div>
        </div>
    </div>

    <div class="diagram-box" id="canvas">
        <div class="connector-line" style="top: 70px; left: 50%; width: 2px; height: 50px;"></div>
        <div id="leftLine" class="connector-line" style="top: 155px; left: 25%; width: 26%; height: 2px; transform: rotate(20deg); transform-origin: right center;"></div>
        <div id="rightLine" class="connector-line" style="top: 155px; left: 50%; width: 26%; height: 2px; transform: rotate(-20deg); transform-origin: left center;"></div>

        <div class="node">
            Incoming Orphan Requests
            <span class="pane-desc" id="flowInputDisplay">140 token calls/sec</span>
        </div>
        
        <div class="node active-proxy" id="proxyNode">
            Inline Proxy Router
            <span class="pane-desc" id="proxySub">Mode: Passive Telemetry Copy</span>
        </div>
        
        <div class="split-row">
            <div class="node ledger" id="leftNode">
                Remediation Ledger
                <span class="pane-desc" id="leftSub">Logging Context IP & Payload</span>
            </div>
            <div class="node destination" id="rightNode">
                Production Database
                <span class="pane-desc" id="rightSub">Status: 200 OK (Passing)</span>
            </div>
        </div>
    </div>
</div>

<script>
    let animationInterval;

    function updateSimulation() {
        const mode = document.getElementById('routingMode').value;
        const traffic = document.getElementById('trafficSlider').value;
        
        document.getElementById('trafficVal').innerText = `${traffic} req/sec`;
        document.getElementById('flowInputDisplay').innerText = `${traffic} token calls/sec`;

        const mCoverage = document.getElementById('metricCoverage');
        const mDowntime = document.getElementById('metricDowntime');
        const mState = document.getElementById('metricState');
        const dCard = document.getElementById('downtimeCard');
        
        const proxySub = document.getElementById('proxySub');
        const leftNode = document.getElementById('leftNode');
        const rightNode = document.getElementById('rightNode');
        const leftSub = document.getElementById('leftSub');
        const rightSub = document.getElementById('rightSub');

        clearInterval(animationInterval);

        if (mode === 'shadow') {
            // Shadow Mode Metrics
            mCoverage.innerText = "100%";
            mCoverage.style.color = "var(--safe-color)";
            mDowntime.innerText = "0%";
            dCard.className = "metric-card safe";
            mState.innerText = "Active Auditing";
            mState.style.color = "var(--accent-color)";

            // Node states UI update
            proxySub.innerText = "Mode: Passive Telemetry Copy";
            leftNode.style.opacity = "1";
            leftNode.style.borderColor = "var(--safe-color)";
            leftSub.innerText = "Logging Context IP & Payload";
            rightNode.style.borderColor = "var(--border)";
            rightNode.style.background = "var(--bg-card)";
            rightSub.innerText = "Status: 200 OK (Passing)";
            document.getElementById('leftLine').style.display = "block";

            triggerPackets('shadow', traffic);
        } else {
            // Hard Block Mode Metrics
            mCoverage.innerText = "20%";
            mCoverage.style.color = "var(--danger-color)";
            mDowntime.innerText = "100%";
            dCard.className = "metric-card danger";
            mState.innerText = "Pipeline Dropped";
            mState.style.color = "var(--danger-color)";

            // Node states UI update
            proxySub.innerText = "Mode: Immediate TCP Reset";
            leftNode.style.opacity = "0.2";
            leftNode.style.borderColor = "var(--border)";
            leftSub.innerText = "Zero Data Collected";
            rightNode.style.borderColor = "var(--danger-color)";
            rightNode.style.background = "rgba(239, 68, 68, 0.05)";
            rightSub.innerText = "Status: 401 Unauthorized (Crash)";
            document.getElementById('leftLine').style.display = "none";

            triggerPackets('block', traffic);
        }
